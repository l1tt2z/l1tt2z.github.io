name: Deploy GitHub Pages

on:
  push:
    branches:
      - main  # 你仓库的默认分支
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库
      - uses: actions/checkout@v3

      # 2. 设置 Node.js（可选，仅用于 future 构建，纯静态可以忽略）
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. 构建步骤（纯静态可省略）
      # - run: npm install
      # - run: npm run build

      # 4. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          token: ${{ github.token }}

      # 5. 可选：输出部署信息
      - name: Deployment Info
        run: echo "✅ GitHub Pages deployed successfully!"